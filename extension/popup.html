<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiline Motopeças</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <img src="icons/icon-48.png" alt="Multiline Motopeças" class="logo" />
      <div>
        <h1>Multiline Motopeças</h1>
        <p>Mercado Livre</p>
      </div>
    </header>

    <nav class="tabs">
      <button type="button" class="tab active" data-tab="import">Importar</button>
      <button type="button" class="tab" data-tab="sync">Sincronizar preços</button>
    </nav>

    <main id="importPanel" class="panel">
      <label for="affiliateUrl">Link de afiliado do Mercado Livre</label>
      <input
        id="affiliateUrl"
        type="url"
        placeholder="https://mercadolivre.com/sec/..."
        autocomplete="off"
      />

      <section id="preview" class="preview hidden">
        <h2>Prévia da página</h2>
        <p id="previewName" class="preview-name"></p>
        <div class="preview-meta">
          <span id="previewPrice"></span>
          <span id="previewImages"></span>
        </div>
        <p id="previewId" class="preview-id"></p>
      </section>

      <p id="status" class="status" aria-live="polite"></p>

      <button id="importBtn" type="button">Importar para revisão</button>
    </main>

    <main id="syncPanel" class="panel hidden">
      <p class="sync-intro">
        Usa sua sessão logada do Mercado Livre no navegador. Mantenha o admin aberto e logado.
      </p>

      <button id="syncCurrentBtn" type="button" class="secondary">Sincronizar este anúncio</button>
      <button id="syncAllBtn" type="button">Sincronizar todos os preços</button>

      <p id="syncStatus" class="status" aria-live="polite"></p>
      <p id="syncProgress" class="sync-progress"></p>
    </main>

    <footer>
      <small id="footerNote">Produtos importados entram como <strong>pendente de revisão</strong>.</small>
    </footer>

    <script src="sync-prices.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
